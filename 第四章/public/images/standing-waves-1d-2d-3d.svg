<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="KaiTi, 'Kaiti SC', serif">

  <!-- 1D: String -->
  <g transform="translate(10, 20)">
    <text x="120" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#C71585">一维：弦</text>

    <!-- walls -->
    <rect x="20" y="20" width="4" height="100" fill="#555" rx="1"/>
    <rect x="236" y="20" width="4" height="100" fill="#555" rx="1"/>

    <!-- standing wave n=3 -->
    <path d="M24,70 C50,20 80,20 89,70 C98,120 120,120 130,70 C140,20 160,20 175,70 C190,120 210,120 236,70"
          fill="none" stroke="#C71585" stroke-width="2.5"/>

    <!-- nodes -->
    <circle cx="24" cy="70" r="4" fill="#C71585"/>
    <circle cx="89" cy="70" r="4" fill="#C71585"/>
    <circle cx="130" cy="70" r="4" fill="#C71585"/>
    <circle cx="175" cy="70" r="4" fill="#C71585"/>
    <circle cx="236" cy="70" r="4" fill="#C71585"/>

    <!-- label -->
    <text x="130" y="155" text-anchor="middle" font-size="13" fill="#333">两端固定 → 半波长整数倍</text>
    <text x="130" y="175" text-anchor="middle" font-size="14" fill="#C71585" font-style="italic">n = 1, 2, 3, …</text>

    <!-- arrow to walls -->
    <text x="10" y="135" font-size="11" fill="#888">固定端</text>
    <text x="220" y="135" font-size="11" fill="#888">固定端</text>
  </g>

  <!-- 2D: Ring -->
  <g transform="translate(300, 20)">
    <text x="130" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#C71585">二维：环</text>

    <!-- ring -->
    <circle cx="130" cy="80" r="60" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- standing wave on ring (m=3) - modulated radius -->
    <path d="M130,14 C158,18 185,32 196,55 C207,78 202,110 190,128
             C178,146 155,162 130,146 C105,130 82,146 70,128
             C58,110 53,78 64,55 C75,32 102,18 130,14Z"
          fill="rgba(199,21,133,0.08)" stroke="#C71585" stroke-width="2.5"/>

    <!-- phi arrow -->
    <path d="M195,50 A70,70 0 0,1 200,65" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <text x="208" y="55" font-size="13" fill="#555" font-style="italic">φ</text>

    <!-- label -->
    <text x="130" y="175" text-anchor="middle" font-size="13" fill="#333">绕一圈必须接上 → m 整数</text>
    <text x="130" y="195" text-anchor="middle" font-size="14" fill="#C71585">ψ(φ+2π) = ψ(φ)</text>

    <!-- join point -->
    <circle cx="130" cy="14" r="4" fill="#C71585"/>
    <text x="130" y="8" text-anchor="middle" font-size="10" fill="#C71585">接合点</text>
  </g>

  <!-- 3D: Sphere θ direction -->
  <g transform="translate(590, 20)">
    <text x="150" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#C71585">三维：球面 θ 方向</text>

    <!-- sphere outline -->
    <ellipse cx="150" cy="90" rx="70" ry="70" fill="none" stroke="#aaa" stroke-width="1.5"/>
    <!-- equator (dashed) -->
    <ellipse cx="150" cy="90" rx="70" ry="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- theta arc from north to south -->
    <path d="M150,20 A70,70 0,0,1 150,160" fill="none" stroke="#C71585" stroke-width="3"/>

    <!-- wave along theta (shown as displacement from arc) -->
    <path d="M150,20 C162,32 165,45 155,55 C145,65 140,78 152,90
             C164,102 160,115 150,125 C140,135 138,148 150,160"
          fill="none" stroke="#E8A040" stroke-width="2.5" stroke-dasharray="6,3"/>

    <!-- north pole -->
    <circle cx="150" cy="20" r="5" fill="#C71585"/>
    <text x="168" y="18" font-size="12" fill="#C71585" font-weight="bold">北极</text>
    <text x="168" y="32" font-size="11" fill="#888">θ = 0</text>

    <!-- south pole -->
    <circle cx="150" cy="160" r="5" fill="#C71585"/>
    <text x="168" y="163" font-size="12" fill="#C71585" font-weight="bold">南极</text>
    <text x="168" y="177" font-size="11" fill="#888">θ = π</text>

    <!-- danger zones -->
    <text x="60" y="85" font-size="12" fill="#E8A040">波函数</text>
    <text x="60" y="100" font-size="12" fill="#E8A040">必须有限</text>

    <!-- label -->
    <text x="150" y="210" text-anchor="middle" font-size="13" fill="#333">两极必须有限 → ℓ 量子化</text>
    <text x="150" y="230" text-anchor="middle" font-size="14" fill="#C71585">|ψ(0)|, |ψ(π)| &lt; ∞</text>
  </g>

  <!-- arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#555" stroke-width="1"/>
    </marker>
  </defs>

  <!-- bottom summary bar -->
  <rect x="30" y="270" width="840" height="40" rx="8" fill="rgba(199,21,133,0.06)" stroke="#C71585" stroke-width="1"/>
  <text x="450" y="296" text-anchor="middle" font-size="15" fill="#333">
    封闭 → 驻波 → 量子化。维度不同，逻辑完全一样。
  </text>

</svg>
